<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shivansh Narain — Full Stack Developer, Graphic Designer, Cybersecurity Enthusiast & ECE Student" />
    <meta property="og:title" content="Shivansh Narain — Portfolio" />
    <meta property="og:description" content="Full Stack Developer | Graphic Designer | Cybersecurity Enthusiast | ECE Student" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Shivansh Narain — Portfolio</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:99999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerHTML = '<strong>Error:</strong> ' + msg + '<br><strong>File:</strong> ' + url + ':' + lineNo + ':' + columnNo + '<br><strong>Stack:</strong> ' + (error && error.stack ? error.stack : '');
        document.body.prepend(errDiv);
        return false;
      };
      window.onunhandledrejection = function(event) {
        var errDiv = document.createElement('div');
        errDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;z-index:99999;padding:20px;font-family:monospace;white-space:pre-wrap;';
        errDiv.innerHTML = '<strong>Unhandled Promise Rejection:</strong> ' + event.reason;
        document.body.prepend(errDiv);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
