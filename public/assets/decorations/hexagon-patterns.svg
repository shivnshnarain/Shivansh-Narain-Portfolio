<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <g stroke="url(#premium-gradient)" stroke-width="1.5" fill="none" opacity="0.5">
      <polygon points="25,5 35,22.3 25,39.6 5,39.6 -5,22.3 5,5" />
      <polygon points="55,5 65,22.3 55,39.6 35,39.6 25,22.3 35,5" />
      <polygon points="40,31 50,48.3 40,65.6 20,65.6 10,48.3 20,31" />
      <polygon points="70,31 80,48.3 70,65.6 50,65.6 40,48.3 50,31" />
    </g>
  
  </svg>