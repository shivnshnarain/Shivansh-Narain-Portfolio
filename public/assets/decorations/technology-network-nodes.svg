<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <circle cx="20" cy="20" r="4" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="80" cy="30" r="5" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="50" cy="80" r="6" fill="#06b6d4" filter="url(#glow)"/>
    <line x1="20" y1="20" x2="80" y2="30" stroke="url(#premium-gradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="20" y1="20" x2="50" y2="80" stroke="url(#premium-gradient)" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="30" x2="50" y2="80" stroke="url(#premium-gradient)" stroke-width="1.5" opacity="0.6"/>
  
  </svg>