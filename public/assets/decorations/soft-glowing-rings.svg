<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <circle cx="50" cy="50" r="40" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="30" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.5" filter="url(#glow)"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6" filter="url(#glow)"/>
  
  </svg>