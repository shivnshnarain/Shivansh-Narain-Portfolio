<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="url(#premium-gradient)" stroke-width="1.5" opacity="0.5" transform="rotate(30 50 50)"/>
    <ellipse cx="50" cy="50" rx="45" ry="15" fill="none" stroke="url(#premium-gradient)" stroke-width="1.5" opacity="0.5" transform="rotate(-30 50 50)"/>
    <circle cx="50" cy="50" r="8" fill="url(#premium-gradient)" filter="url(#glow)"/>
    <circle cx="15" cy="30" r="3" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="85" cy="70" r="3" fill="#8b5cf6" filter="url(#glow)"/>
  
  </svg>