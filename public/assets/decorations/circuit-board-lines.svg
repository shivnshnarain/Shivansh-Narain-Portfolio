<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <path d="M10,50 L30,50 L40,40 L60,40 L70,30 L90,30" fill="none" stroke="#06b6d4" stroke-width="2" opacity="0.7"/>
    <circle cx="10" cy="50" r="3" fill="#06b6d4"/>
    <circle cx="90" cy="30" r="3" fill="#06b6d4"/>
    
    <path d="M20,80 L40,80 L50,70 L80,70" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7"/>
    <circle cx="20" cy="80" r="3" fill="#8b5cf6"/>
    <circle cx="80" cy="70" r="3" fill="#8b5cf6"/>
  
  </svg>