<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
    
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" /> <!-- Cyan-500 -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet-500 -->
    </linearGradient>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/> 
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

    
    <circle cx="10" cy="10" r="2" fill="#06b6d4"/>
    <circle cx="30" cy="25" r="1.5" fill="#8b5cf6"/>
    <circle cx="15" cy="40" r="2.5" fill="#06b6d4" filter="url(#glow)"/>
    <circle cx="50" cy="15" r="1" fill="#8b5cf6"/>
    <circle cx="70" cy="35" r="2" fill="#06b6d4"/>
    <circle cx="85" cy="10" r="1.5" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="45" cy="65" r="2" fill="#06b6d4"/>
    <circle cx="75" cy="80" r="3" fill="#8b5cf6" filter="url(#glow)"/>
    <circle cx="25" cy="85" r="1.5" fill="#06b6d4"/>
  
  </svg>